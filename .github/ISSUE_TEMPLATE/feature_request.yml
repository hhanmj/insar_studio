name: Feature request
description: 提出新功能或流程改进建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你遇到的使用问题
      description: 先描述真实场景，而不是直接描述按钮或界面。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你希望怎么解决
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: 相关模块
      options:
        - Sentinel-1 / ASF
        - Sentinel-2
        - Landsat / HLS
        - SAR 下载中心
        - AOI / 区域选择
        - 精密轨道
        - DEM
        - 安装 / 更新
        - 文档
        - 其他
  - type: textarea
    id: alternatives
    attributes:
      label: 你现在的替代做法
  - type: textarea
    id: extra
    attributes:
      label: 其他说明
