name: Release

# Publish the Windows one-file executables to a GitHub Release whenever a version
# tag (e.g. v0.15.0) is pushed. These are what end users download, and they are
# the release the in-app update check ("update-check" / the post-command notice)
# compares against, so the loop is: tag -> build -> release -> users notified.
#
# Three artifacts are published:
#   * insar-prep.exe                    -- the lean CLI (no rasterio; convert-dem
#                                          needs the GUI exe)
#   * insar-prep-gui.exe                -- the full desktop GUI (bundles rasterio +
#                                          EGM96 geoid + the download extra, so it
#                                          can do real DEM conversion and the real
#                                          ASF/DEM/GACOS downloads)
#   * insar-prep-gui-<version>-setup.exe -- a standard Windows installer (Inno
#                                          Setup) wrapping the GUI exe

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      # gui + download + convert extras are bundled into the GUI exe so real
      # download / DEM conversion / auth work; the dev group provides PyInstaller.
      - name: Install dependencies
        run: uv sync --extra gui --extra download --extra convert --dev

      - name: Stage artifacts dir
        run: New-Item -ItemType Directory -Force -Path artifacts | Out-Null

      # Runs the quality gate (pytest + ruff), builds dist/insar-prep.exe, and
      # smoke-tests it fully offline.
      - name: Build and smoke-test the CLI exe
        run: pwsh -File scripts/build_windows_exe.ps1

      - name: Stage the CLI exe
        run: Copy-Item dist/insar-prep.exe artifacts/

      # Builds dist/insar-prep-gui.exe (PySide6 + rasterio + geoid) and runs the
      # off-screen self-test. This script cleans dist/, hence staging above.
      - name: Build and smoke-test the GUI exe
        run: pwsh -File scripts/build_windows_gui_exe.ps1

      - name: Stage the GUI exe
        run: Copy-Item dist/insar-prep-gui.exe artifacts/

      # Compile the standard Windows installer (Inno Setup) that wraps the GUI
      # exe. Inno Setup is not preinstalled on the runner; install it via Chocolatey.
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Derive the release version from the tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build the Windows installer
        run: pwsh -File scripts/build_windows_installer.ps1 -Version ${{ steps.version.outputs.version }}

      - name: Stage the installer
        run: Copy-Item dist/insar-prep-gui-*-setup.exe artifacts/

      - name: Publish the exes and installer to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
