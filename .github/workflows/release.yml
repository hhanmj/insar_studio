name: Release

# Publish Windows desktop builds to a GitHub Release whenever a version tag
# (for example v2.0.1) is pushed. The desktop app checks the latest GitHub
# Release on startup and every hour, so the loop is:
# tag -> build -> release -> users see the update notice.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install web dependencies
        working-directory: ui
        run: npm ci

      # desktop + download + convert extras are bundled into the desktop exe so
      # real ASF download / DEM conversion / auth work; the dev group provides
      # PyInstaller.
      - name: Install dependencies
        run: uv sync --extra desktop --extra download --extra convert --dev

      - name: Stage artifacts dir
        run: New-Item -ItemType Directory -Force -Path artifacts | Out-Null

      - name: Build web UI
        working-directory: ui
        run: npm run build

      - name: Build and smoke-test the desktop exe
        run: pwsh -File scripts/build_windows_desktop_exe.ps1 -SkipUi

      - name: Stage desktop release assets
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $exeName = "InSAR-Studio-$version.exe"
          Copy-Item dist/insar-prep-desktop.exe "artifacts/$exeName"
          @(
            "InSAR Studio $version",
            "",
            '本项目不替代 SARscape、ISCE、MintPy、SNAP 或 ASF Vertex。',
            '它的定位是“处理前的数据准备助手”，帮助新手把下载、检查、目录组织和辅助数据准备流程做得更清楚。',
            "",
            "运行：双击 $exeName。",
            '隐私：发行包不包含账号、Token、下载历史、缓存或本机测试目录；用户首次使用需在设置里配置必要凭据。'
          ) | Set-Content -Encoding UTF8 artifacts/README_RELEASE.txt
          Compress-Archive -Path "artifacts/$exeName", "artifacts/README_RELEASE.txt" -DestinationPath "artifacts/insar-studio-$version-portable.zip" -Force
          Get-FileHash -Algorithm SHA256 "artifacts/$exeName", "artifacts/insar-studio-$version-portable.zip" |
            ForEach-Object { "$($_.Hash)  $([IO.Path]::GetFileName($_.Path))" } |
            Set-Content -Encoding ASCII artifacts/SHA256SUMS.txt

      - name: Publish desktop assets to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.exe
            artifacts/*.zip
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
