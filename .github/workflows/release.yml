name: Release

# Publish the Windows one-file executable to a GitHub Release whenever a version
# tag (e.g. v0.16.0) is pushed. This is what end users download, and it is the
# release the in-app update check ("update-check" / the post-command notice)
# compares against, so the loop is: tag -> build -> release -> users notified.
#
# Published for now:
#   * insar-prep.exe -- the lean CLI (no rasterio; convert-dem needs the GUI
#                       exe or a source install with --extra convert)
#
# TEMPORARILY PAUSED (pending the GUI redesign): the desktop GUI exe
# (insar-prep-gui.exe) and the Inno Setup installer
# (insar-prep-gui-<version>-setup.exe). The build scripts and packaging are kept
# in the repo; re-enable the commented steps below once the new UI is ready.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      # gui + download + convert extras are bundled into the GUI exe so real
      # download / DEM conversion / auth work; the dev group provides PyInstaller.
      - name: Install dependencies
        run: uv sync --extra gui --extra download --extra convert --dev

      - name: Stage artifacts dir
        run: New-Item -ItemType Directory -Force -Path artifacts | Out-Null

      # Runs the quality gate (pytest + ruff), builds dist/insar-prep.exe, and
      # smoke-tests it fully offline.
      - name: Build and smoke-test the CLI exe
        run: pwsh -File scripts/build_windows_exe.ps1

      - name: Stage the CLI exe
        run: Copy-Item dist/insar-prep.exe artifacts/

      # NOTE: the desktop GUI exe and the Windows installer are TEMPORARILY
      # PAUSED while the GUI is being redesigned -- only the CLI exe is published
      # for now. The GUI build/installer scripts (scripts/build_windows_gui_exe.ps1,
      # scripts/build_windows_installer.ps1) and the Inno Setup packaging are kept
      # in the repo; re-enable the steps below once the new UI lands.
      #
      # - name: Build and smoke-test the GUI exe
      #   run: pwsh -File scripts/build_windows_gui_exe.ps1
      # - name: Stage the GUI exe
      #   run: Copy-Item dist/insar-prep-gui.exe artifacts/
      # - name: Install Inno Setup
      #   run: choco install innosetup --no-progress -y
      # - name: Derive the release version from the tag
      #   id: version
      #   shell: pwsh
      #   run: |
      #     $version = "${{ github.ref_name }}" -replace '^v', ''
      #     "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      # - name: Build the Windows installer
      #   run: pwsh -File scripts/build_windows_installer.ps1 -Version ${{ steps.version.outputs.version }}
      # - name: Stage the installer
      #   run: Copy-Item dist/insar-prep-gui-*-setup.exe artifacts/

      - name: Publish the CLI exe to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
