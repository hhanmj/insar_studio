name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check executable scripts for curly quotes
        run: python3 scripts/check_ascii_quotes.py

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Python dependencies
        run: uv sync --extra desktop --extra download --extra convert --dev

      - name: Compile Python sources
        run: uv run python -m compileall -q src packaging

      - name: Install web dependencies
        working-directory: ui
        run: npm ci

      - name: Build web UI
        working-directory: ui
        run: npm run build
