    <rect x="913" y="166" width="166" height="48" rx="14" fill="#eff6ff"/>
    <text x="934" y="196" fill="#1d4ed8">SLC 下载中 62%</text>
    <rect x="913" y="230" width="166" height="48" rx="14" fill="#f0fdf4"/>
    <text x="934" y="260" fill="#15803d">轨道匹配完成</text>
    <rect x="913" y="294" width="166" height="48" rx="14" fill="#fff7ed"/>
    <text x="934" y="324" fill="#c2410c">DEM 等待转换</text>
    <rect x="913" y="358" width="166" height="32" rx="16" fill="#f1f5f9"/>
    <text x="947" y="380" fill="#475569">日志可追踪</text>
  </g>
